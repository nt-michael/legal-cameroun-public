<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8dfe8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a8c8d8;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#2a6b8a" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg)" />

  <!-- Subtle decorative circles -->
  <circle cx="100" cy="100" r="180" fill="#2a6b8a" opacity="0.05" />
  <circle cx="1100" cy="575" r="220" fill="#2a6b8a" opacity="0.05" />

  <!-- Document icon -->
  <g transform="translate(600, 337.5)" filter="url(#shadow)">
    <!-- Page body -->
    <rect x="-80" y="-100" width="160" height="200" rx="12" ry="12" fill="#2a6b8a" opacity="0.85" />
    <!-- Folded corner -->
    <polygon points="40,-100 80,-60 40,-60" fill="#1a5070" opacity="0.9" />
    <!-- Text lines -->
    <rect x="-55" y="-40" width="110" height="12" rx="6" fill="#ffffff" opacity="0.6" />
    <rect x="-55" y="-18" width="90" height="12" rx="6" fill="#ffffff" opacity="0.6" />
    <rect x="-55" y="4" width="110" height="12" rx="6" fill="#ffffff" opacity="0.6" />
    <rect x="-55" y="26" width="70" height="12" rx="6" fill="#ffffff" opacity="0.6" />
    <rect x="-55" y="48" width="100" height="12" rx="6" fill="#ffffff" opacity="0.6" />
  </g>

  <!-- Decorative lines below icon representing caption text -->
  <rect x="460" y="490" width="280" height="10" rx="5" fill="#2a6b8a" opacity="0.18" />
  <rect x="510" y="510" width="180" height="8" rx="4" fill="#2a6b8a" opacity="0.12" />
</svg>
